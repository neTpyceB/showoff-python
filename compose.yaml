services:
  api:
    build:
      context: .
      target: runtime
    command: ["showoff-pipeline-api"]
    environment:
      PIPELINE_API_HOST: 0.0.0.0
      PIPELINE_API_PORT: "8000"
      PIPELINE_DB_PATH: /data/pipeline.db
      PIPELINE_INSERT_BATCH_SIZE: "500"
    ports:
      - "8000:8000"
    volumes:
      - pipeline-data:/data

  checks:
    build:
      context: .
      target: dev
    environment:
      PIPELINE_API_HOST: 0.0.0.0
      PIPELINE_API_PORT: "8000"
      PIPELINE_DB_PATH: /workspace/.tmp/pipeline.db
      PIPELINE_INSERT_BATCH_SIZE: "500"
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["sh", "-lc", "ruff check . && ruff format --check . && coverage run -m pytest && coverage report --fail-under=100 && python -m build"]

volumes:
  pipeline-data:
