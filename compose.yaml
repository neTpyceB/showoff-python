services:
  api:
    build:
      context: .
      target: runtime
    environment:
      APP_API_TOKEN: local-token
      APP_DATABASE_PATH: /data/notes.db
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data

  checks:
    build:
      context: .
      target: dev
    environment:
      APP_API_TOKEN: local-token
      APP_DATABASE_PATH: /workspace/data/checks.db
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["sh", "-lc", "ruff check . && ruff format --check . && coverage run -m pytest && coverage report --fail-under=100 && python -m build"]
