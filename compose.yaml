services:
  api:
    build:
      context: .
      target: runtime
    command: ["showoff-saas-api"]
    environment:
      SAAS_API_HOST: 0.0.0.0
      SAAS_API_PORT: "8000"
      SAAS_DB_PATH: /data/saas.db
    ports:
      - "8000:8000"
    volumes:
      - saas-data:/data

  checks:
    build:
      context: .
      target: dev
    environment:
      SAAS_API_HOST: 0.0.0.0
      SAAS_API_PORT: "8000"
      SAAS_DB_PATH: /workspace/.tmp/saas.db
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: ["sh", "-lc", "ruff check . && ruff format --check . && coverage run -m pytest && coverage report --fail-under=100 && python -m build"]

volumes:
  saas-data:
